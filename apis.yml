apis:
  - aid: amazon-workspaces:amazon-workspaces-api
    name: Amazon WorkSpaces API
    description: >-
      The Amazon WorkSpaces API provides programmatic access to manage cloud-based
      virtual desktops. It enables developers to create, modify, and terminate
      WorkSpaces, manage workspace bundles and directories, configure IP access
      control groups, and automate desktop provisioning and lifecycle management
      at scale. 65 operations for workspace lifecycle, bundles, directories,
      images, and access control.
