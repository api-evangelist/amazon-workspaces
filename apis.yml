aid: amazon-workspaces
name: Amazon WorkSpaces
description: >-
  Amazon WorkSpaces is a managed, secure Desktop-as-a-Service (DaaS) solution
  that enables you to provision cloud-based virtual desktops for your users. It
  eliminates the need to procure and deploy hardware or install complex software,
  providing persistent desktops accessible from various devices with built-in
  security and management capabilities. The API provides 65 operations for
  workspace lifecycle management, bundle and directory management, image
  management, and IP access control groups.
