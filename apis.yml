  - type: Features
    data:
      - name: Persistent Virtual Desktops
        description: >-
          Cloud-based Windows or Linux desktops with persistent storage that
          users can access from any device or location.
      - name: Desktop Bundle Catalog
        description: >-
          Configurable compute bundles ranging from Value to Graphics.g4dn
          to match workload requirements and cost targets.
      - name: Active Directory Integration
        description: >-
          Integration with AWS Managed Microsoft AD and AD Connector for
          user authentication and policy management.
      - name: Application Management
        description: >-
          Deploy and manage applications across WorkSpaces using application
          assignment and streaming capabilities.
      - name: IP Access Control Groups
        description: >-
          Restrict workspace access by IP address ranges to enforce
          network-based access controls.
      - name: Running Mode Flexibility
        description: >-
          AlwaysOn mode for power users and AutoStop mode for cost
          optimization of occasional-use desktops.
      - name: BYOD Support
        description: >-
          Thin client, web browser, iOS, Android, Linux, macOS, and Windows
          client access for bring-your-own-device scenarios.
      - name: Workspace Snapshots and Restore
        description: >-
          Automated snapshots enable restoring workspaces to previous states
          for disaster recovery and user error correction.
  - type: UseCases
    data:
      - name: Remote Work Enablement
        description: >-
          Provide secure cloud desktops to remote and distributed employees
          without managing physical hardware.
      - name: Contractor and Temporary Worker Access
        description: >-
          Quickly provision and terminate secure desktops for contractors
          with time-limited access needs.
      - name: Desktop Refresh and Modernization
        description: >-
          Replace aging desktop hardware with cloud-based virtual desktops
          to reduce capital expenditure.
      - name: BYOD Security
        description: >-
          Enable personal device usage while keeping corporate data and
          applications in the secure cloud environment.
      - name: Regulated Industry Compliance
        description: >-
          Maintain data residency and security compliance in regulated
          industries like healthcare and finance.
  - type: Integrations
    data:
      - name: AWS Directory Service
        description: >-
          Managed Microsoft AD and AD Connector for user authentication
          and group policy management.
      - name: AWS IAM
        description: >-
          IAM-based access control for WorkSpaces API operations and
          resource-level permissions.
      - name: Amazon S3
        description: >-
          User storage and workspace image storage backed by Amazon S3.
      - name: AWS CloudTrail
        description: >-
          Audit logging of all WorkSpaces API calls for compliance
          and security monitoring.
      - name: Amazon CloudWatch
        description: >-
          Metrics and monitoring for workspace performance, connectivity,
          and health status.
